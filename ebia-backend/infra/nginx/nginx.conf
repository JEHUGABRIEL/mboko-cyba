# ============================================================
#  E-Bia — Configuration Nginx
#  Reverse proxy : routes tout vers les microservices internes
# ============================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
  worker_connections 1024;
}

http {
  # ── Sécurité de base ───────────────────────────────────────
  server_tokens off;
  add_header X-Content-Type-Options nosniff;
  add_header X-Frame-Options DENY;
  add_header X-XSS-Protection "1; mode=block";

  # ── Limites réseau (critique pour la RCA) ─────────────────
  client_max_body_size 2M;        # Max upload audio 10s = ~300 Ko, 2M de marge
  client_body_timeout 30s;
  send_timeout 30s;

  # ── Compression ────────────────────────────────────────────
  gzip on;
  gzip_types application/json text/plain application/javascript;
  gzip_min_length 1024;

  # ── Rate limiting ──────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
  limit_req_zone $binary_remote_addr zone=recognize:10m rate=10r/m;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

  # ── Upstream ───────────────────────────────────────────────
  upstream api_gateway {
    server api-gateway:4000;
    keepalive 32;
  }

  upstream audio_service {
    server audio-service:8000;
    keepalive 8;
  }

  # ── Serveur principal ──────────────────────────────────────
  server {
    listen 80;
    server_name api.e-bia.app;

    # Redirection HTTPS en production
    # return 301 https://$host$request_uri;

    # ── API principale ────────────────────────────────────────
    location /api/ {
      limit_req zone=api burst=10 nodelay;

      proxy_pass         http://api_gateway;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection 'upgrade';
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 30s;
    }

    # ── Reconnaissance audio (limite plus stricte) ────────────
    location /api/v1/recognize {
      limit_req zone=recognize burst=3 nodelay;

      proxy_pass         http://audio_service;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_read_timeout 30s;        # Upload 3G peut prendre 15s
      client_max_body_size 1M;       # 10s OGG = ~300Ko, 1M de marge
    }

    # ── Auth endpoints (limite anti-brute-force) ─────────────
    location /api/v1/auth/ {
      limit_req zone=auth burst=2 nodelay;

      proxy_pass         http://api_gateway;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
    }

    # ── Webhook Orange Money ──────────────────────────────────
    location /webhooks/orange-money {
      proxy_pass         http://api_gateway;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_read_timeout 10s;
    }

    # ── Health check ──────────────────────────────────────────
    location /health {
      proxy_pass http://api_gateway;
      access_log off;
    }
  }
}
