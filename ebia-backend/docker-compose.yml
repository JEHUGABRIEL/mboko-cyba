# ============================================================
#  E-Bia — Stack complète (Dev & Prod)
#  Lancer : docker compose up --build
# ============================================================

services:

  # ── 1. Reverse proxy ─────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: ebia_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/certs:/etc/nginx/certs:ro       # Certificats Let's Encrypt
    depends_on:
      - api-gateway
      - audio-service
    restart: unless-stopped
    networks: [ebia_net]

  # ── 2. API Gateway (Node.js / Express) ───────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: ebia_keycloak
    command:
      - start-dev
      - --import-realm
    environment:
      - KEYCLOAK_ADMIN=${KC_ADMIN}
      - KEYCLOAK_ADMIN_PASSWORD=${KC_ADMIN_PASSWORD}
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://postgres:5432/keycloak
      - KC_DB_USERNAME=ebia
      - KC_DB_PASSWORD=${POSTGRES_PASSWORD}
      - KC_HTTP_ENABLED=true
      - KC_PROXY=edge
    volumes:
      - ./infra/keycloak:/opt/keycloak/data/import
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks: [ebia_net]

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: ebia_api
    environment:
      - NODE_ENV=production
      - PORT=4000
      - JWT_SECRET=${JWT_SECRET}
      - POSTGRES_URL=postgresql://ebia:${POSTGRES_PASSWORD}@postgres:5432/ebia
      - REDIS_URL=redis://redis:6379
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - AUDIO_SERVICE_URL=http://audio-service:8000
      - PAYMENT_SERVICE_URL=http://payment-service:5000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks: [ebia_net]

  # ── 3. Service Audio — Reconnaissance (Python / FastAPI) ─
  audio-service:
    build:
      context: ./audio-service
      dockerfile: Dockerfile
    container_name: ebia_audio
    environment:
      - POSTGRES_URL=postgresql://ebia:${POSTGRES_PASSWORD}@postgres:5432/ebia
      - REDIS_URL=redis://redis:6379
      - MINIO_ENDPOINT=minio
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks: [ebia_net]

  # ── 4. Service Paiement (Node.js / Orange Money) ─────────
  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: ebia_payment
    environment:
      - PORT=5000
      - ORANGE_MONEY_URL=${ORANGE_MONEY_URL}
      - ORANGE_CLIENT_ID=${ORANGE_CLIENT_ID}
      - ORANGE_CLIENT_SECRET=${ORANGE_CLIENT_SECRET}
      - POSTGRES_URL=postgresql://ebia:${POSTGRES_PASSWORD}@postgres:5432/ebia
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks: [ebia_net]

  # ── 5. PostgreSQL ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ebia_postgres
    environment:
      - POSTGRES_DB=ebia
      - POSTGRES_USER=ebia
      - POSTGRES_MULTIPLE_DATABASES=ebia,keycloak
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/create-multiple-dbs.sh:/docker-entrypoint-initdb.d/00-create-dbs.sh:ro
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ebia"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks: [ebia_net]

  # ── 6. Redis (cache empreintes audio) ────────────────────
  redis:
    image: redis:7-alpine
    container_name: ebia_redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks: [ebia_net]

  # ── 7. MinIO (stockage fichiers audio) ───────────────────
  minio:
    image: minio/minio:latest
    container_name: ebia_minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"    # Console admin MinIO (dev uniquement)
    restart: unless-stopped
    networks: [ebia_net]

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  ebia_net:
    driver: bridge
